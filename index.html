<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>...</title>

<style>

body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:'Courier New', monospace;
  color:#ff0000;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  z-index:0;
}

#countdown{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 90px;
  letter-spacing: 8px;
  color: #ff0000;
  text-shadow:
    0 0 10px red,
    0 0 20px red,
    0 0 40px red;
  z-index: 2;
}

#message{
  display:none;
  position:absolute;
  text-align:center;
  color:#ff4da6;
  font-size:75px;
  font-weight:bold;
  z-index:2;
  text-shadow:
    -2px -2px 0 #000,
    2px -2px 0 #000,
    -2px 2px 0 #000,
    2px 2px 0 #000,
    0 0 8px #ff4da6;
}

.pixel{
  position:absolute;
  font-size:90px;
  opacity:0.95;
  animation:float 14s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-100vh)}
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="countdown"></div>

<div id="message">
<span>Dünyanın En Güzel Doktorlarının</span><br>
<span>Tıp Bayramı Kutlu Olsun</span>
</div>

<!-- SES BUTONU VE AUDIO -->
<div id="soundButton" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: #ff4da6;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  box-shadow: 0 0 10px #000;
  z-index: 10;
  font-size: 30px;
  color: white;
">
  🔊
</div>

<audio id="bgm" loop>
  <source src="agir.mp3" type="audio/mpeg">
  Tarayıcınız audio etiketini desteklemiyor.
</audio>

<script>
const bgm = document.getElementById("bgm");
const btn = document.getElementById("soundButton");

btn.addEventListener("click", () => {
    if(bgm.paused){
        bgm.play();
        btn.style.background="#00cc66"; // çalarken yeşil
    } else {
        bgm.pause();
        btn.style.background="#ff4da6"; // durunca pembe
    }
});
</script>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 18;
const columns = canvas.width/fontSize;

const drops = [];

for(let x = 0; x < columns; x++)
  drops[x] = 1;

function drawMatrix(){

  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#ff0000";
  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++){

    const text = letters.charAt(Math.floor(Math.random()*letters.length));

    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(drawMatrix,33);

const targetDate = new Date("March 14, 2026 00:00:00").getTime();
const countdown = document.getElementById("countdown");
const message = document.getElementById("message");

const timer = setInterval(function(){

  const now = new Date().getTime();
  const distance = targetDate - now;

  const days = Math.floor(distance/(1000*60*60*24));
  const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
  const seconds = Math.floor((distance%(1000*60))/1000);

  countdown.innerHTML =
    String(days).padStart(2,"0")+":"+
    String(hours).padStart(2,"0")+":"+
    String(minutes).padStart(2,"0")+":"+
    String(seconds).padStart(2,"0");

  if(distance < 0){

    clearInterval(timer);

    document.body.style.background="#162a6b";
    canvas.style.display="none";

    countdown.style.display="none";
    message.style.display="block";

    spawnPixels();
    confetti();

  }

},1000);

function spawnPixels(){

  const icons=["🩺","💊","💉","❤️","⚕️","🧬"];

  for(let i=0;i<40;i++){

    let el=document.createElement("div");

    el.className="pixel";
    el.innerHTML=icons[Math.floor(Math.random()*icons.length)];

    el.style.left=Math.random()*100+"vw";
    el.style.animationDuration=(6+Math.random()*10)+"s";

    document.body.appendChild(el);

  }

}

function confetti(){
  const c = document.createElement("canvas");
  document.body.appendChild(c);
  const ctx = c.getContext("2d");

  c.width = window.innerWidth;
  c.height = window.innerHeight;

  let pieces = [];
  const colors = ["#ff4da6","#ff0000","#00ffcc","#ffff33","#ffffff"]; // renkler

  for(let i=0;i<200;i++){
    pieces.push({
      x: Math.random()*c.width,
      y: Math.random()*c.height,
      r: Math.random()*6+2,
      color: colors[Math.floor(Math.random()*colors.length)]
    });
  }

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);

    for(let p of pieces){
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();

      p.y += Math.random()*3 + 2; // düşme hızı
      if(p.y > c.height){
        p.y = 0;
        p.x = Math.random()*c.width;
        p.color = colors[Math.floor(Math.random()*colors.length)];
      }
    }

    requestAnimationFrame(draw);
  }

  draw();
}
</script>

</body>

</html>
